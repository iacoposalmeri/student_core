<ion-split-pane contentId="main-admin-content" when="md">
  <ion-menu menuId="menu-admin" contentId="main-admin-content" side="start" type="overlay">
    <ion-content>
      <ion-list>
        <ion-item lines="none" class="ion-padding-vertical">
          <ion-label>
            <h2>{{ nomeAdmin }}</h2>
            <p>SuperUser</p>
          </ion-label>
        </ion-item>
        
        <ion-item button routerLink="/admin-dashboard/avvisi" routerLinkActive="selected">Avvisi</ion-item>
        <ion-item button routerLink="/admin-dashboard/didattica" routerLinkActive="selected">Didattica</ion-item>
        <ion-item button routerLink="/admin-dashboard/campus" routerLinkActive="selected">Campus</ion-item>
        <ion-item button routerLink="/admin-dashboard/tickets" routerLinkActive="selected">Help Desk</ion-item>
        <ion-item button routerLink="/admin-dashboard/moderazione" routerLinkActive="selected">Moderazione</ion-item>
        <ion-item button routerLink="/admin-dashboard/analytics" routerLinkActive="selected">Analytics</ion-item>
      </ion-list>
    </ion-content>
  </ion-menu>

  <ion-router-outlet id="main-admin-content"></ion-router-outlet>
</ion-split-pane>
