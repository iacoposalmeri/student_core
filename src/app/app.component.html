<ion-app>

  <ion-menu contentId="main-content" side="end" (ionWillOpen)="caricaDatiMenu()">
    <ion-header>
      <ion-toolbar color="primary">
        <ion-title>Impostazioni</ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content>
      
      <div class="menu-profile-header">
        <ion-avatar class="menu-avatar">
          <img [src]="fotoProfilo" />
        </ion-avatar>
        <h2 class="menu-nome">{{ nomeStudente }} {{ cognomeStudente }}</h2> 
      </div>

      <ion-list lines="full">
        
        <ion-item button (click)="navigaA('/profilo')">
          <ion-icon name="person-outline" slot="start"></ion-icon>
          <ion-label>Gestione Profilo</ion-label>
        </ion-item>
        
        <ion-item button (click)="navigaA('/personalizzazione')">
          <ion-icon name="color-palette-outline" slot="start"></ion-icon>
          <ion-label>Personalizzazione</ion-label>
        </ion-item>

        <ion-item button>
          <ion-icon name="headset-outline" slot="start"></ion-icon>
          <ion-label>Help Desk</ion-label>
        </ion-item>
        
      </ion-list>
    </ion-content>

    <ion-footer>
      <ion-toolbar>
        <ion-item button lines="none" (click)="logout()" detail="false">
          <ion-icon name="log-out-outline" slot="start" color="danger"></ion-icon>
          <ion-label color="danger" style="font-weight: 600;">Esci dall'app</ion-label>
        </ion-item>
      </ion-toolbar>
    </ion-footer>
  </ion-menu>

  <ion-router-outlet id="main-content"></ion-router-outlet>

</ion-app>
