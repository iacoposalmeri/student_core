<ion-content class="ion-padding" style="background: #f4f5f8;">

  <ion-refresher slot="fixed" (ionRefresh)="doRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button menu="menu-admin"></ion-menu-button>
    </ion-buttons>
    <ion-title style="font-weight: 700; font-size: 1.3rem;">Editor Avvisi</ion-title>
  </ion-toolbar>
    
  <ion-grid>
    <ion-row class="ion-justify-content-center">
      <ion-col size="12" size-md="10" size-lg="9" size-xl="8">
        
        <div class="ion-padding-vertical">
          <h2 style="font-weight: 700; color: var(--ion-color-primary);">Dirama un nuovo Avviso</h2>
          <p style="color: var(--ion-color-step-600); margin-top: 4px;">Pubblica una comunicazione istituzionale in tempo reale.</p>
        </div>

        <ion-card class="ion-no-margin" style="box-shadow: 0 4px 16px rgba(0,0,0,0.04); border-radius: 12px;">
          <ion-card-content class="ion-padding">
            <ion-input [(ngModel)]="nuovaNews.titolo" label="Oggetto della comunicazione *" labelPlacement="floating" fill="outline" placeholder="Es. Allerta Meteo"></ion-input>

            <div style="margin: 20px 0;">
              <ion-select 
                [(ngModel)]="nuovaNews.tipo" 
                label="Tipologia *" 
                labelPlacement="stacked" 
                fill="outline" 
                placeholder="Seleziona..."
                okText="Conferma" 
                cancelText="Annulla" 
                [interfaceOptions]="{ cssClass: 'custom-select-popup' }">
                
                <ion-select-option value="Generale">Avviso Generale</ion-select-option>
                <ion-select-option value="Emergenza">Emergenza</ion-select-option>
              </ion-select>
            </div>

            <ion-textarea [(ngModel)]="nuovaNews.contenuto" label="Corpo del testo *" labelPlacement="floating" fill="outline" rows="6" placeholder="Scrivi qui..."></ion-textarea>

            <ion-button expand="block" class="ion-margin-top" (click)="diramaAvviso()" style="font-weight: 600; height: 45px;">
              PUBBLICA AVVISO
            </ion-button>
          </ion-card-content>
        </ion-card>

        <ion-card class="ion-margin-top" style="box-shadow: 0 4px 16px rgba(0,0,0,0.04); border-radius: 12px;">
          <ion-card-header>
            <ion-card-title style="font-size: 1.2rem; font-weight: 700; color: var(--ion-color-primary);" >Avvisi Pubblicati</ion-card-title>
          </ion-card-header>
          
          <ion-list lines="full">
            <ion-item *ngFor="let n of listaNews">
              <ion-label>
                <h2 style="font-weight: 600;">{{ n.titolo }}</h2>
                <p style="font-size: 0.9rem;">{{ n.contenuto }}</p>
              </ion-label>
              <ion-button slot="end" fill="clear" color="danger" class="action-btn" (click)="eliminaAvviso(n.id)">
                <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
              </ion-button>
            </ion-item>
          </ion-list>
        </ion-card>

      </ion-col>
    </ion-row>
  </ion-grid>

</ion-content>
