<ion-content class="ion-padding ion-text-center">
  
  <div class="login-container">
    
    <div style="margin-bottom: 30px;">
      <h2>StudentCore</h2>
    </div>

    <ion-card>
      <ion-card-content>
        
        <ion-item>
          <ion-input 
            type="email" 
            label="Email Universitaria" 
            labelPlacement="floating" 
            placeholder="alessandro.biagini@community.unipa.it">
          </ion-input>
        </ion-item>

        <ion-item>
          <ion-input 
            type="password" 
            label="Password" 
            labelPlacement="floating" 
            placeholder="Inserisci password">
          </ion-input>
        </ion-item>

        <ion-button expand="block" style="margin-top: 10px;" (click)="accedi()">
          Accedi
        </ion-button>
        
      </ion-card-content>
    </ion-card>

  </div> </ion-content>
