<ion-content class="ion-padding ion-text-center custom-bg">
  
  <div class="register-container">
    
    <div class="logo-container">
      <h2 class="app-title">StudentCore</h2>
      <p class="subtitle">Il tuo ecosistema digitale</p>
    </div>

    <ion-card class="glass-card">
      <ion-card-content>
        <form [formGroup]="registerForm" (ngSubmit)="registrati()">

          <ion-item class="input-item" lines="none">
            <ion-icon name="mail-outline" slot="start" color="primary" class="register-icon"></ion-icon>
            <ion-input 
              type="email" 
              label="Email" 
              labelPlacement="floating" 
              placeholder="mario.rossi@community.unipa.it"
              formControlName="email"
              [errorText]="f['email'].dirty && f['email'].errors?.['pattern'] ? 'Formato richiesto: nome.cognome01@community.unipa.it o @you.unipa.it' : 'Email obbligatoria'">
            </ion-input>
          </ion-item>

          <ion-item class="input-item" lines="none">
            <ion-icon name="card-outline" slot="start" color="primary" class="register-icon"></ion-icon>
            <ion-input 
              type="text" 
              maxlength="7"
              label="Matricola" 
              labelPlacement="floating" 
              placeholder="Es. A123456"
              formControlName="matricola"
              [errorText]="f['matricola'].dirty && f['matricola'].errors ? 'La matricola deve essere di esattamente 7 cifre' : 'Matricola obbligatoria'">
            </ion-input>
          </ion-item>

          <ion-item class="input-item" lines="none">
            <ion-icon name="calendar-outline" slot="start" color="primary" class="register-icon"></ion-icon>
            <ion-input 
              type="tel" 
              maxlength="4"
              label="Anno Immatricolazione" 
              labelPlacement="floating" 
              placeholder="Es. 2024"
              formControlName="anno_immatricolazione"
              [errorText]="f['anno_immatricolazione'].dirty && f['anno_immatricolazione'].errors ? 'Inserisci un anno valido' : 'Anno obbligatorio'">
            </ion-input>
          </ion-item>

          <ion-item class="input-item" lines="none">
            <ion-icon name="school-outline" slot="start" color="primary" class="register-icon"></ion-icon>
            
            <ion-select 
              formControlName="id_corso" 
              label="Corso di Studi" 
              labelPlacement="stacked" 
              placeholder="Seleziona un corso..."
              cancelText="Annulla"
              okText="Conferma"
              [interfaceOptions]="{ cssClass: 'custom-task-alert' }">
              <ion-select-option *ngFor="let corso of corsi" [value]="corso.id">
                {{ corso.nome_corso }} ({{ corso.tipo_laurea }})
              </ion-select-option>
            </ion-select>
          </ion-item>

          <ion-item class="input-item" lines="none">
            <ion-icon name="lock-closed-outline" slot="start" color="primary" class="register-icon"></ion-icon>
            <ion-input 
              [type]="passwordType" 
              label="Password" 
              labelPlacement="floating" 
              placeholder="Inserisci password"
              formControlName="password"
              [errorText]="f['password'].dirty && f['password'].errors?.['pattern'] ? 'Min. 8 caratteri, una maiuscola, un numero e un simbolo' : 'Password obbligatoria'">
            </ion-input>
            <ion-button fill="clear" slot="end" (click)="togglePassword()" style="margin-top: 15px;">
              <ion-icon [name]="passwordIcon"></ion-icon>
            </ion-button>
          </ion-item>

          <ion-item class="input-item" lines="none">
            <ion-icon name="lock-closed-outline" slot="start" color="primary" class="register-icon"></ion-icon>
            <ion-input 
              [type]="confirmPasswordType" 
              label="Conferma Password" 
              labelPlacement="floating" 
              placeholder="Ripeti password"
              formControlName="confirmPassword"
              [errorText]="f['confirmPassword'].dirty && f['confirmPassword'].hasError('mismatch') ? 'La password deve coincidere con quella scritta sopra' : 'Conferma password obbligatoria'">
            </ion-input>
            <ion-button fill="clear" slot="end" (click)="toggleConfirmPassword()" style="margin-top: 15px;">
              <ion-icon [name]="confirmPasswordIcon"></ion-icon>
            </ion-button>
          </ion-item>

          <div *ngIf="errorMessage" class="database-error-banner">
            <ion-icon name="alert-circle-outline"></ion-icon>
            <span>{{ errorMessage }}</span>
          </div>

          <div *ngIf="successMessage" class="database-success-banner">
            <ion-icon name="checkmark-circle-outline"></ion-icon>
            <span>{{ successMessage }}</span>
          </div>

          <ion-button 
            type="submit"
            expand="block" 
            class="register-btn" 
            [disabled]="registerForm.invalid || isLoading">
            
            <span *ngIf="!isLoading">Registrati</span>
            <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
          </ion-button>

          <div class="auxiliary-links">
            <a routerLink="/login">Hai già un account? Accedi</a>
          </div>

        </form>
      </ion-card-content>
    </ion-card>

  </div> 
  
</ion-content>
